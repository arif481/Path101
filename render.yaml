services:
  - type: web
    name: path101-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: AUTO_MIGRATE
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_MINUTES
        value: "10080"
      - key: ADMIN_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false

  - type: worker
    name: path101-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: AUTO_MIGRATE
        value: "false"
      - key: REDIS_URL
        sync: false
      - key: SCHEDULER_INTERVAL_SECONDS
        value: "60"
      - key: NUDGE_LOOKAHEAD_MINUTES
        value: "30"
      - key: NUDGE_LOOKBACK_HOURS
        value: "24"
      - key: NUDGE_LOCK_TTL_SECONDS
        value: "86400"
      - key: BANDIT_EPSILON
        value: "0.2"
      - key: BANDIT_MIN_HISTORY
        value: "3"
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false

  - type: static
    name: path101-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
